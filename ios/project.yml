name: Mercurius
options:
  bundleIdPrefix: com.mayoailiteracy
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: complete
    # NOTE: ENABLE_USER_SCRIPT_SANDBOXING is intentionally off — our xattr
    # strip script needs to write to the .app bundle. Re-enable during
    # App Store hardening if Apple ever requires it for iOS (currently
    # only a warning, not a rejection).
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "5"
    DEVELOPMENT_TEAM: "TMBPRHZYW2"
  configs:
    # Pin signing per configuration. Debug stays on automatic (Xcode handles
    # local-dev signing on the simulator just fine). Release uses MANUAL
    # signing with Apple Distribution — this is the key to making TestFlight
    # archives work on a brand-new team:
    #
    #   With automatic signing, `xcodebuild archive` does a pre-flight check
    #   that requires a working *Development* provisioning profile, which
    #   needs at least one registered device on the team. We have zero
    #   devices on purpose (App Store distribution doesn't need any), so
    #   automatic signing deadlocks before it even gets to the distribution
    #   step. Manual signing skips that pre-flight, and with
    #   `-allowProvisioningUpdates` + the App Store Connect API key,
    #   xcodebuild can still create a Distribution cert + profile on
    #   demand — without ever asking for a dev profile.
    Debug:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Apple Distribution"

packages:
  LocalPackages:
    path: Packages
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

targets:
  Mercurius:
    type: application
    platform: iOS
    sources:
      - path: Mercurius
    resources:
      - Mercurius/Resources/Assets.xcassets
      # Privacy manifest — required by the App Store since May 2024.
      # Declares: no tracking, the two data types we collect
      # (session id + chat content, neither linked to user identity),
      # and our one required-reason API use (UserDefaults, CA92.1).
      - Mercurius/Resources/PrivacyInfo.xcprivacy
    postBuildScripts:
      - name: Strip extended attributes (macOS workaround for codesign)
        script: |
          # macOS adds com.apple.FinderInfo / com.apple.provenance to
          # files during write. Stripped codesign (-) rejects these.
          # Run as the last script phase so it executes AFTER Copy
          # Bundle Resources (which also re-adds xattrs) and right
          # before codesign.
          if [ -d "${TARGET_BUILD_DIR}" ]; then
            /usr/bin/xattr -cr "${TARGET_BUILD_DIR}"
          fi
        basedOnDependencyAnalysis: false
        runOnlyWhenInstalling: false
    dependencies:
      - package: LocalPackages
        product: AppFeature
      - package: LocalPackages
        product: ChatFeature
      - package: LocalPackages
        product: CurriculumFeature
      - package: LocalPackages
        product: SettingsFeature
      - package: LocalPackages
        product: PersistenceKit
      - package: LocalPackages
        product: DesignSystem
      - package: LocalPackages
        product: NetworkingKit
    info:
      path: Mercurius/Resources/Info.plist
      properties:
        CFBundleDisplayName: Mercurius
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIStatusBarStyle: UIStatusBarStyleDefault
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Opt out of iPad multitasking (split view / slide-over). Without
        # this, the App Store validator rejects portrait-only iPad builds
        # because multitasking requires all four orientations.
        # Mercurius is designed for a single full-screen reading/typing
        # context, so split view doesn't add value — locking full-screen
        # keeps the layout predictable on iPad.
        UIRequiresFullScreen: true
        # Declare encryption compliance: we use only HTTPS/TLS over
        # URLSession, which is exempt from US export review. Setting
        # this to false skips the annual compliance questionnaire on
        # every App Store submission.
        ITSAppUsesNonExemptEncryption: false
        # Keep ATS strict: HTTPS only, no arbitrary loads. Our backend
        # is hosted on Railway (https) and the club JSON lives on the
        # mayoailiteracy.com TLS cert.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        # App Store Connect category. Drives where users discover us.
        LSApplicationCategoryType: public.app-category.education
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mayoailiteracy.mercurius.native
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
      configs:
        # Mirror the project-level signing config at the target level —
        # xcodegen leaves the per-target CODE_SIGN_IDENTITY as
        # "iPhone Developer" by default, which would otherwise override
        # our project-level Apple Distribution setting at archive time.
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          # Named profile that release.sh will create on the fly via the
          # App Store Connect API if it doesn't already exist locally.
          # Manual signing requires SOME profile name; this lets the
          # script bootstrap a Distribution profile without ever needing
          # an interactive Xcode sign-in.
          PROVISIONING_PROFILE_SPECIFIER: "Mercurius App Store"

  MercuriusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MercuriusTests
    dependencies:
      - target: Mercurius
      - package: LocalPackages
        product: NetworkingKit
      - package: LocalPackages
        product: DesignSystem
      - package: LocalPackages
        product: ChatFeature
      - package: LocalPackages
        product: CurriculumFeature
      - package: LocalPackages
        product: SettingsFeature
      - package: SnapshotTesting
        product: SnapshotTesting
    postCompileScripts:
      - name: Strip extended attributes (macOS workaround for codesign)
        script: |
          if [ -d "${TARGET_BUILD_DIR}" ]; then
            /usr/bin/xattr -cr "${TARGET_BUILD_DIR}"
          fi
        basedOnDependencyAnalysis: false
        runOnlyWhenInstalling: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mayoailiteracy.mercurius.native.tests
        GENERATE_INFOPLIST_FILE: YES

  MercuriusUITests:
    # XCUITest bundle — exercises the app end-to-end through the
    # accessibility API. These tests do NOT require network: all the
    # flows covered (boot, tab switch, starter prompt presence, settings
    # sheet, mode selector, Dynamic Type scaling) are client-side only.
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MercuriusUITests
    dependencies:
      - target: Mercurius
    postCompileScripts:
      - name: Strip extended attributes (macOS workaround for codesign)
        script: |
          if [ -d "${TARGET_BUILD_DIR}" ]; then
            /usr/bin/xattr -cr "${TARGET_BUILD_DIR}"
          fi
        basedOnDependencyAnalysis: false
        runOnlyWhenInstalling: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mayoailiteracy.mercurius.native.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Mercurius

schemes:
  Mercurius:
    build:
      targets:
        Mercurius: all
        MercuriusTests: [test]
        MercuriusUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      # Gather code-coverage data every time this scheme's tests run.
      # `scripts/coverage.sh` drives a full run and extracts a summary;
      # Xcode's own report viewer also works out of the box. We
      # intentionally omit `coverageTargets:` so every linked framework
      # (including all SPM package products) gets instrumented, not
      # just the thin Mercurius.app shell.
      gatherCoverageData: true
      # NOTE: SPM package tests are NOT included here — xcodegen can't
      # reference them in schemes. Run them with:
      #   cd Packages && swift test --enable-code-coverage
      # UI tests live in MercuriusUITests. Run selectively via:
      #   xcodebuild test -only-testing:MercuriusUITests -scheme Mercurius ...
      targets:
        - MercuriusTests
        - MercuriusUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
