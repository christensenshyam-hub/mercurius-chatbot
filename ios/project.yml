name: Mercurius
options:
  bundleIdPrefix: com.mayoailiteracy
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: complete
    # NOTE: ENABLE_USER_SCRIPT_SANDBOXING is intentionally off — our xattr
    # strip script needs to write to the .app bundle. Re-enable during
    # App Store hardening if Apple ever requires it for iOS (currently
    # only a warning, not a rejection).
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  LocalPackages:
    path: Packages

targets:
  Mercurius:
    type: application
    platform: iOS
    sources:
      - path: Mercurius
    resources:
      - Mercurius/Resources/Assets.xcassets
    postCompileScripts:
      - name: Strip extended attributes (macOS workaround for codesign)
        script: |
          # macOS adds com.apple.FinderInfo / com.apple.provenance to files
          # during write. Stripped codesign (-) rejects these. This phase
          # runs before the codesign phase, so clearing them here is safe.
          if [ -d "${CODESIGNING_FOLDER_PATH}" ]; then
            /usr/bin/xattr -cr "${CODESIGNING_FOLDER_PATH}"
          fi
        basedOnDependencyAnalysis: false
        runOnlyWhenInstalling: false
    dependencies:
      - package: LocalPackages
        product: AppFeature
      - package: LocalPackages
        product: DesignSystem
      - package: LocalPackages
        product: NetworkingKit
    info:
      path: Mercurius/Resources/Info.plist
      properties:
        CFBundleDisplayName: Mercurius
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIStatusBarStyle: UIStatusBarStyleDefault
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mayoailiteracy.mercurius.native
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO

  MercuriusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MercuriusTests
    dependencies:
      - target: Mercurius
      - package: LocalPackages
        product: NetworkingKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mayoailiteracy.mercurius.native.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Mercurius:
    build:
      targets:
        Mercurius: all
        MercuriusTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MercuriusTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
